<!DOCTYPE html>
<html>
<head>
<title>Flip Animation</title>

<style>

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f2f2f2;
}

/* card container */

.card{
width:200px;
height:250px;
perspective:1000px;
}

/* inner flip area */

.card-inner{
width:100%;
height:100%;
position:relative;
transition:transform 0.8s;
transform-style:preserve-3d;
}

/* hover flip */

.card:hover .card-inner{
transform:rotateY(180deg);
}

/* front and back */

.card-front, .card-back{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border:1px solid #000;
display:flex;
justify-content:center;
align-items:center;
font-size:20px;
}

/* front */

.card-front{
background:white;
}

/* back */

.card-back{
background:lightblue;
transform:rotateY(180deg);
}

</style>

</head>

<body>

<div class="card">

<div class="card-inner">

<div class="card-front">
FRONT
</div>

<div class="card-back">
BACK
</div>

</div>

</div>

</body>
</html>
