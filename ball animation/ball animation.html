<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ball Animation</title>
</head>

<body>
    <link rel="stylesheet" href="B.animation.css">
    
    <style>

body{
background-color:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* Ball Style */

.ball{
width:80px;
height:80px;
background-color:red;
border-radius:50%;
position:relative;

animation:bounce 1s infinite alternate;
}

/* Animation */

@keyframes bounce{

0%{
top:0;
}

100%{
top:300px;
}

}

</style>

</head>
<body>
    <div class="ball">

    </div>
